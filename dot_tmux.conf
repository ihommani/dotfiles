# Tmux Configuration
# Generated with TmuxAI Config Generator
# https://tmuxai.dev

# -- Basic Settings ------------------------------------------
set -g prefix C-b
set -g escape-time 500
set -g history-limit 5000
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on

# -- Key Bindings ------------------------------------------

# Pane navigation
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# -- Various --
# -- It's 'S' upper case so we can still benefit from the 's' binding which list sessions ------
bind S set-window-option synchronize-panes \; display-message "Synchronize panes: #{?pane_synchronized, on, off}"

# -- Windowing --------------
bind c new-window -c '#{window_root}'
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# -- Status Bar ---------------------------------------------
set -g status-position bottom
set -g status-interval 5
set -g status-left "#{session_name} "
set -g status-left-length 50
set -g status-right "#{host} %Y-%m-%d %H:%M"
set -g status-right-length 50

# -- Plugins -----------------------------------------------
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Theme
set -g @plugin 'wfxr/tmux-power'

# Theme configuration
set -g @tmux_power_theme gold

# Other plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager
# Keep this line at the very bottom of tmux.confrun '~/.tmux/plugins/tpm/tpm'
